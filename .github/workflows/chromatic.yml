name: Chromatic

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

# CI runs checks as explicit steps; husky's local git hooks add no value here.
env:
  HUSKY: "0"

jobs:
  chromatic:
    name: Visual Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Chromatic uses git history to find each build's baseline.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so dist artifacts (e.g. @jasonruesch/tokens/css, consumed by
      # the Tailwind stylesheet) exist before Storybook is built.
      - name: Build
        run: pnpm build

      - name: Run Chromatic
        uses: chromaui/action@v17
        # Chromatic serves Storybook from its own root domain, so build without
        # the GitHub Pages base path (see apps/docs/.storybook/main.ts).
        env:
          STORYBOOK_DISABLE_BASE_PATH: "true"
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/docs
          buildScriptName: build-storybook
          # The project is linked to GitHub, so Chromatic reports snapshot
          # results via a separate commit status check; the job can finish as
          # soon as the build is uploaded instead of waiting for that.
          exitOnceUploaded: true
