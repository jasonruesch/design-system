name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

# Husky git hooks are developer-only quality gates; CI runs the same checks as
# explicit steps. Disabling them stops the changesets release commit/push from
# re-triggering the pre-push hook (`pnpm typecheck && pnpm test`) inside the
# release job, which would otherwise fail (no Playwright browser installed).
env:
  HUSKY: "0"

jobs:
  checks:
    name: Format, Lint, Typecheck, Test & Build
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        !startsWith(github.event.head_commit.message, 'chore(release):')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so dist artifacts (e.g. @jasonruesch/tokens/css, consumed by
      # the Tailwind stylesheet) exist before the checks that resolve them.
      - name: Build
        run: pnpm build

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # The docs Storybook stories run as Vitest browser tests via Playwright.
      - name: Install Playwright browser
        run: pnpm --filter @jasonruesch/docs exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test

  deploy-docs:
    name: Deploy Docs to GitHub Pages
    needs: checks
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        !startsWith(github.event.head_commit.message, 'chore(release):')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Serve assets from the GitHub Pages base path /<repo>/ (see
      # apps/docs/.storybook/main.ts). Only this deploy build opts in.
      - name: Build Storybook
        run: pnpm build-storybook
        env:
          STORYBOOK_BASE_PATH: "true"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    name: Release
    needs: checks
    if: >-
      ${{
        always() &&
        (needs.checks.result == 'success' || needs.checks.result == 'skipped') &&
        github.event_name == 'push'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
